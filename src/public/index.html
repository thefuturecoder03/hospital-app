<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Room Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f6f9; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 750px; margin: auto; width: 100%; box-sizing: border-box; }
        h1, h3 { color: #2c3e50; margin-top: 0; }
        input, select { width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        label { font-weight: bold; color: #34495e; }
        button { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button.login-btn { background: #2980b9; }
        button.login-btn:hover { background: #2471a3; }
        button:hover { background: #219653; }
        button.refresh-btn { background: #7f8c8d; margin-bottom: 15px; padding: 8px 12px; font-size: 14px; width: auto; }
        button.refresh-btn:hover { background: #95a5a6; }
        .action-container { display: flex; gap: 5px; }
        button.edit-btn { background: #f39c12; padding: 6px 10px; font-size: 12px; font-weight: bold; border-radius: 4px; width: auto; color: white; border: none; cursor: pointer; }
        button.edit-btn:hover { background: #d35400; }
        button.delete-btn { background: #e74c3c; padding: 6px 10px; font-size: 12px; font-weight: bold; border-radius: 4px; width: auto; color: white; border: none; cursor: pointer; }
        button.delete-btn:hover { background: #c0392b; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .locked { background: #e74c3c; color: white; }
        .unlocked { background: #2ecc71; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #2c3e50; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .badge-priority { background-color: #e67e22; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .badge-status { background-color: #3498db; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Staff Authentication Card -->
    <div class="card">
        <h1>🔐 Staff Authentication</h1>
        <p>Security Link: <span id="auth-status" class="status-badge locked">Locked (No Token)</span></p>
        <hr>
        <label for="email">Staff Email:</label>
        <input type="email" id="email" value="admin@hospital.com">
        
        <label for="password">Password:</label>
        <input type="password" id="password" value="password123">
        
        <button class="login-btn" onclick="loginStaff()">Authenticate Session</button>
    </div>

    <!-- Patient Intake Card -->
    <div class="card">
        <h1>🏥 Hospital Management</h1>
        <hr>
        <h3>Admit New Patient</h3>
        
        <label for="name">Patient Name:</label>
        <input type="text" id="name" placeholder="John Doe">
        
        <label for="age">Age:</label>
        <input type="number" id="age" placeholder="45">

        <label for="condition">Medical Condition:</label>
        <select id="condition">
            <option value="Standard">Standard Care</option>
            <option value="Respiratory">Respiratory Issues</option>
            <option value="Infectious">Infectious Disease (Isolation Priority)</option>
        </select>
        
        <!-- Live Database Driven Manual Room Dropdown Selector -->
        <label for="room-select">Assign Available Room:</label>
        <select id="room-select">
            <option value="">-- Authenticate session to discover open rooms --</option>
        </select>
        
        <button onclick="admitPatient()">Evaluate & Assign Room</button>
    </div>

    <!-- Live Patient Feed Log View Grid -->
    <div class="card">
        <h3>📋 Evaluated Patient Queue Logs</h3>
        <button class="refresh-btn" onclick="fetchPatientQueue()">🔄 Refresh Log Feed</button>
        <table>
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Age</th>
                    <th>Condition</th>
                    <th>Priority Score</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="patient-table-body">
                <tr>
                    <td colspan="6" style="text-align: center; color: #7f8c8d;">Authenticate your session to pull live log tracks...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        let authToken = "";

        async function loginStaff() {
            const emailVal = document.getElementById('email').value;
            const passwordVal = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal, password: passwordVal })
                });

                const result = await response.json();

                if (response.ok && result.token) {
                    authToken = result.token;
                    document.getElementById('auth-status').textContent = "Unlocked (Active Session)";
                    document.getElementById('auth-status').className = "status-badge unlocked";
                    alert("Authentication successful! Session unlocked.");
                    fetchPatientQueue();
                    populateAvailableRooms();
                } else {
                    alert(`Login Failed: ${result.message || 'Invalid credentials'}`);
                }
            } catch (error) {
                console.error('Auth Error:', error);
                alert('Connection to auth engine failed.');
            }
        }

        async function populateAvailableRooms() {
            if (!authToken) return;
            const roomSelect = document.getElementById('room-select');
            
            try {
                const response = await fetch('/api/rooms/available', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                roomSelect.innerHTML = "";
                
                if (!data.rooms || data.rooms.length === 0) {
                    roomSelect.innerHTML = '<option value="">-- No vacant rooms available (Hospital Full) --</option>';
                    return;
                }
                
                data.rooms.forEach(room => {
                    const opt = document.createElement('option');
                    opt.value = room.id;
                    opt.textContent = `Room ${room.number} (Available)`;
                    roomSelect.appendChild(opt);
                });
            } catch (err) {
                console.error("Dropdown Generation Error:", err);
                roomSelect.innerHTML = '<option value="">-- Error fetching vacant beds --</option>';
            }
        }

        async function admitPatient() {
            if (!authToken) {
                alert('Access Denied. Please authenticate session above first.');
                return;
            }

            const patientName = document.getElementById('name').value;
            const patientAge = parseInt(document.getElementById('age').value);
            let patientCondition = document.getElementById('condition').value;
            const roomIdVal = document.getElementById('room-select').value;

            if (patientCondition.includes("Infectious")) {
                patientCondition = "Infectious";
            } else if (patientCondition.includes("Respiratory")) {
                patientCondition = "Respiratory";
            } else {
                patientCondition = "Standard";
            }

            if (!patientName || !patientAge) {
                alert('Please enter a name and age.');
                return;
            }
            if (!roomIdVal) {
                alert('Please pick an open room assignment option.');
                return;
            }

            try {
                const response = await fetch('/api/patients', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        name: patientName,
                        age: patientAge,
                        condition: patientCondition,
                        isHighRisk: patientAge > 70,
                        selectedRoomId: roomIdVal
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert(`📋 Evaluation Complete!\n\nPatient: ${result.patient.name}\nPriority Score: ${result.patient.priorityScore}\nStatus: ${result.patient.status}`);
                    fetchPatientQueue();
                    populateAvailableRooms();
                    document.getElementById('name').value = "";
                    document.getElementById('age').value = "";
                } else {
                    alert(`Error: ${result.error || result.message || 'Could not process evaluation.'}`);
                }

            } catch (error) {
                console.error('Transmission Error:', error);
                alert('Failed to connect to the hospital processing engine.');
            }
        }

        async function fetchPatientQueue() {
            if (!authToken) return;
            
            try {
                const response = await fetch('/api/patients', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                const tableBody = document.getElementById('patient-table-body');
                tableBody.innerHTML = "";

                if (!response.ok) {
                    tableBody.innerHTML = `<tr><td colspan="6" style="color:red; text-align:center;">Error loading queue tracks.</td></tr>`;
                    return;
                }

                if (!data.patients || data.patients.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#7f8c8d;">No evaluated patients found in the active database registry.</td></tr>`;
                    return;
                }

                data.patients.forEach(pt => {
                    const currentRoomNum = pt.room ? pt.room.number : "";
                    
                    const row = `<tr>
                        <td><strong>${pt.name}</strong></td>
                        <td>${pt.age}</td>
                        <td>${pt.condition}</td>
                        <td><span class="badge-priority">${pt.priorityScore}</span></td>
                        <td><span class="badge-status">${pt.status}</span></td>
                        <td>
                            <div class="action-container">
                                <button class="edit-btn" onclick="editPatient('${pt.id}', '${pt.name}', ${pt.age}, '${pt.condition}', '${currentRoomNum}')">✏️ Edit</button>
                                <button class="delete-btn" onclick="deletePatient('${pt.id}')">❌ Discharge</button>
                            </div>
                        </td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });

            } catch (err) {
                console.error("Queue Retrieval Error:", err);
            }
        }

        // FULL 4-STAGE PROMPT MANAGEMENT CHAIN (NAME, AGE, CONDITION, THEN ROOM SWAP)
        async function editPatient(id, oldName, oldAge, oldCondition, oldRoomNumber) {
            const newName = prompt("Enter updated patient name:", oldName);
            if (!newName) return;

            const newAgeStr = prompt("Enter updated patient age:", oldAge);
            if (!newAgeStr) return;
            const newAge = parseInt(newAgeStr);

            const newCondition = prompt("Enter condition (Standard, Respiratory, or Infectious):", oldCondition);
            if (!newCondition) return;

            // Step 4: Conditional room modification verification sequence
            const wantRoomChange = confirm(`Current Assignment: Room ${oldRoomNumber || 'None'}\n\nDo you want to switch this patient to a different room?`);
            let targetRoomId = null;

            if (wantRoomChange) {
                const chosenRoomNum = prompt("Enter the new Room Number you want to assign (e.g. 102, 105):");
                if (chosenRoomNum) {
                    targetRoomId = `room-${chosenRoomNum.trim()}`;
                }
            }

            try {
                const response = await fetch(`/api/patients/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ 
                        name: newName, 
                        age: newAge, 
                        condition: newCondition,
                        newRoomId: targetRoomId // Pass housing variable if modified
                    })
                });

                if (response.ok) {
                    alert("Patient record data and room allocations updated successfully!");
                    fetchPatientQueue();
                    populateAvailableRooms();
                } else {
                    const errData = await response.json();
                    alert(`Update Failed: ${errData.error || 'Unable to process update parameters.'}`);
                }
            } catch (error) {
                console.error("Update request failure:", error);
                alert("Could not communicate change command to server backend.");
            }
        }

        async function deletePatient(patientId) {
            if (!confirm("Are you sure you want to discharge and remove this patient?")) return;

            try {
                const response = await fetch(`/api/patients/${patientId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    alert("Patient discharged. Bed space successfully freed.");
                    fetchPatientQueue();
                    populateAvailableRooms();
                } else {
                    alert("Deletion Failed.");
                }
            } catch (error) {
                console.error("Delete Error:", error);
            }
        }
    </script>
</body>
</html>
